services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: onboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - onboard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  onboard-postgres-data:
    external: true
    name: 2e0c05a7acbfff6980ab80a3033d31ab05aca8cab1897e369ca8ffad64d3e123
